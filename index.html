
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Salary Predictor</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
<style>
       :root {
           --primary: #6366f1;
           --secondary: #a855f7;
           --bg: #0f172a;
           --glass: rgba(255, 255, 255, 0.03);
           --glass-border: rgba(255, 255, 255, 0.1);
       }
       body {
           font-family: 'Plus Jakarta Sans', sans-serif;
           background: radial-gradient(circle at top right, #1e1b4b, var(--bg));
           color: white;
           display: flex;
           justify-content: center;
           align-items: center;
           min-height: 100vh;
           margin: 0;
           overflow: hidden;
       }
       /* Efeito de Orbe no Fundo */
       body::before {
           content: "";
           position: absolute;
           width: 300px;
           height: 300px;
           background: var(--primary);
           filter: blur(120px);
           border-radius: 50%;
           z-index: -1;
           opacity: 0.4;
           top: 20%;
           left: 20%;
       }
       .container {
           background: var(--glass);
           backdrop-filter: blur(12px);
           -webkit-backdrop-filter: blur(12px);
           border: 1px solid var(--glass-border);
           padding: 3rem;
           border-radius: 24px;
           box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
           text-align: center;
           width: 100%;
           max-width: 400px;
           transition: transform 0.3s ease;
       }
       h2 {
           margin-top: 0;
           font-weight: 700;
           letter-spacing: -1px;
           background: linear-gradient(to right, #fff, #94a3b8);
           -webkit-background-clip: text;
           -webkit-text-fill-color: transparent;
       }
       p {
           color: #94a3b8;
           font-size: 0.9rem;
           margin-bottom: 2rem;
       }
       .input-group {
           position: relative;
           margin-bottom: 1.5rem;
       }
       input {
           width: 100%;
           padding: 12px 0;
           background: transparent;
           border: none;
           border-bottom: 2px solid var(--glass-border);
           color: white;
           font-size: 1.2rem;
           outline: none;
           transition: border-color 0.3s;
           text-align: center;
       }
       input:focus {
           border-color: var(--primary);
       }
       button {
           width: 100%;
           padding: 14px;
           border-radius: 12px;
           border: none;
           background: linear-gradient(135deg, var(--primary), var(--secondary));
           color: white;
           font-weight: 700;
           cursor: pointer;
           transition: all 0.3s ease;
           box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
       }
       button:hover {
           transform: translateY(-2px);
           filter: brightness(1.1);
           box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
       }
       button:active {
           transform: translateY(0);
       }
       #status {
           font-size: 0.8rem;
           color: var(--secondary);
           margin-top: 1.5rem;
           text-transform: uppercase;
           letter-spacing: 1px;
       }
       #resultado {
           font-size: 2rem;
           margin-top: 1rem;
           color: #22c55e;
           text-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
       }
</style>
</head>
<body>
<div class="container">
<h2>Contabil IA</h2>
<p>Previsão de salários baseada em experiência.</p>
<div class="input-group">
<input type="number" id="anos" placeholder="Anos de experiência" min="0">
</div>
<button onclick="treinarEPrever()">Calcular Previsão</button>
<div id="status">Aguardando comando...</div>
<div id="resultado"></div>
</div>
<script src="script.js"></script>
</body>
</html>
